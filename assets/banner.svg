<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">apple-code</title>
  <desc id="desc">Local-first coding shell for Apple Foundation Models and Ollama.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#15263f"/>
      <stop offset="100%" stop-color="#1f1b3f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#78dcff"/>
      <stop offset="50%" stop-color="#ff9ad6"/>
      <stop offset="100%" stop-color="#87ffcb"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="420" fill="url(#bg)" rx="24"/>

  <g opacity="0.35">
    <circle cx="1320" cy="90" r="140" fill="#73d5ff"/>
    <circle cx="1480" cy="280" r="170" fill="#c08bff"/>
    <circle cx="250" cy="40" r="110" fill="#58ffd2"/>
  </g>

  <g stroke="url(#accent)" stroke-width="2" fill="none" opacity="0.6">
    <path d="M80 330 C 260 210, 520 390, 760 260 C 980 150, 1220 320, 1520 180"/>
    <path d="M80 360 C 300 220, 560 430, 820 290 C 1080 150, 1280 320, 1520 240" opacity="0.55"/>
  </g>

  <g transform="translate(100, 104)">
    <text x="0" y="95" font-family="SF Pro Display, Segoe UI, Helvetica, Arial, sans-serif" font-size="92" font-weight="700" fill="url(#accent)" filter="url(#softGlow)">apple-code</text>
    <text x="4" y="152" font-family="SF Pro Text, Segoe UI, Helvetica, Arial, sans-serif" font-size="32" fill="#e8f4ff" opacity="0.95">Local-first coding shell for Apple Foundation Models + Ollama</text>
    <text x="4" y="198" font-family="SF Mono, Menlo, Consolas, monospace" font-size="24" fill="#9dc8ff" opacity="0.9">swift cli • tools • sessions • web • browser • apple apps</text>
  </g>

  <g transform="translate(1120, 294)">
    <rect x="0" y="0" width="372" height="74" rx="16" fill="#0d1b30" stroke="#5ec8ff" stroke-opacity="0.7"/>
    <text x="20" y="32" font-family="SF Mono, Menlo, Consolas, monospace" font-size="20" fill="#a4daff">$ apple-code --provider ollama</text>
    <text x="20" y="58" font-family="SF Mono, Menlo, Consolas, monospace" font-size="20" fill="#86ffd1">› ready</text>
  </g>
</svg>
