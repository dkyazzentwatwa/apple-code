name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Verify Swift 6.2 is active
        run: swift --version | grep -E "Swift version 6\\.2(\\.| )"

      - name: Check FoundationModels availability
        id: foundationmodels
        shell: bash
        run: |
          set +e
          cat > /tmp/foundationmodels-check.swift <<'EOF'
          import FoundationModels
          print("FoundationModels available")
          EOF

          swift /tmp/foundationmodels-check.swift >/tmp/foundationmodels-check.out 2>/tmp/foundationmodels-check.err
          status=$?

          if [ "$status" -eq 0 ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "FoundationModels is available on this runner."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "FoundationModels is NOT available on this runner; skipping build/test."
            cat /tmp/foundationmodels-check.err
          fi
          exit 0

      - name: Build
        if: steps.foundationmodels.outputs.available == 'true'
        run: swift build

      - name: Test + Coverage Gate
        if: steps.foundationmodels.outputs.available == 'true'
        run: ./scripts/coverage.sh

      - name: Skip summary
        if: steps.foundationmodels.outputs.available != 'true'
        run: |
          echo "Skipped: project requires FoundationModels (macOS 26+ on Apple Silicon)."
